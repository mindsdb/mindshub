services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      COWORK_SERVER_HOST: "0.0.0.0"
      COWORK_SERVER_PORT: "26866"
      DATABASE_URI: "sqlite:////home/cowork/.cowork/cowork.db"
      # ANTON_ANTHROPIC_API_KEY: "sk-ant-..."
    volumes:
      - cowork-data:/home/cowork/.cowork
    # ENG-459: do NOT publish 26866 to the host. Publishing it exposed the raw,
    # unauthenticated API directly, bypassing nginx. `expose` keeps the port
    # reachable only on the compose network — nginx (web) still proxies to it as
    # `api:26866`. NOTE: the nginx /v1/ path is itself still unauthenticated
    # until app-layer auth (COWORK_REQUIRE_AUTH / bearer-token-auth) lands.
    expose:
      - "26866"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:26866/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cowork-data:
    driver: local
